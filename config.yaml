# ── Per-country training configs ──────────────────────────────────────────────
# The pipeline reads training_country to select the right block below.
# Each country can override any shared setting. If a setting isn't specified
# per-country, the shared default is used.
#
# Usage: python -m model_pipeline.training.s10_pipeline          (uses training_country)
#        python -m model_pipeline.training.s10_pipeline --country sco   (override)
#        python -m model_pipeline.training.s10_pipeline --all           (all three)

training_country: eng

countries:
  eng:
    dataset_name: eng_training
    n_topics: 30
    model_run: null
    tfidf:
      min_df: 3
      max_df: 0.85
      max_features: 3000
      ngram_range: [1, 2]

  sco:
    dataset_name: sco_training
    n_topics: 15
    model_run: null
    tfidf:
      min_df: 3
      max_df: 0.85
      max_features: 2000              # smaller corpus → fewer features
      ngram_range: [1, 2]

  irl:
    dataset_name: irl_training
    n_topics: 15                      # coherence peaks at k=10 (0.609) but k=15 (0.590) gives more interpretable topics — broad catch-all topics at k=10 split into distinct themes at k=15
    model_run: null
    tfidf:
      min_df: 3
      max_df: 0.85
      max_features: 2000              # smaller corpus → fewer features
      ngram_range: [1, 2]

# ── Shared NMF settings (same for all countries) ─────────────────────────────
nmf:
  random_state: 42
  init: nndsvd
  max_iter: 1000

# ── Evaluation ───────────────────────────────────────────────────────────────
evaluation:
  coherence_topic_range: [5, 55, 5]
  n_top_words: 10
  stability_seeds: [42, 123, 456, 789, 1024]
  stability_init: nndsvda
  stability_max_iter: 1000

# ── Inference & drift ────────────────────────────────────────────────────────
inference:
  model_type: nmf
  countries: [eng, sco, irl]

drift:
  cadence: monthly
  baseline: eng_training
