data:
  dataset_name: eng_training

tfidf:
  min_df: 3
  max_df: 0.85
  max_features: 3000
  ngram_range: [1, 2]

nmf:
  n_topics: 30
  random_state: 42
  init: nndsvd
  max_iter: 1000

evaluation:
  coherence_topic_range: [5, 80, 5]   # passed as range(start, stop, step)
  n_top_words: 10
  stability_seeds: [1, 2, 3, 4, 5]
  stability_init: nndsvda
  stability_max_iter: 3000
